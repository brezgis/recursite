(function(){
"use strict";

/* =================================================================
   PRINTER
   ================================================================= */
const paper   = document.getElementById("paper");
const kb      = document.getElementById("kb");
const sendBtn = document.getElementById("sendBtn");

let cps = 42;                 // characters per second (BRISK)
let soundOn = false;
let audio = null;

let queue = [];               // items: {text, cls}
let printing = false;
let curLine = null;
let head = null;

function ensureLine(cls){
  if(!curLine){
    curLine = document.createElement("div");
    if(cls) curLine.className = cls;
    if(head && head.parentNode === paper) paper.insertBefore(curLine, head);
    else paper.appendChild(curLine);   // head may be parked inside a line mid-print
  }
}
function makeHead(){
  head = document.createElement("span");
  head.className = "head";
  paper.appendChild(head);
}
makeHead();

function jitterSpan(c, cls){
  const s = document.createElement("span");
  s.className = cls ? "ch "+cls : "ch";
  s.textContent = c;
  const dy = (Math.random()*1.1 - 0.55).toFixed(2);
  const rot = (Math.random()*1.2 - 0.6).toFixed(2);
  const op  = (0.72 + Math.random()*0.26).toFixed(2);
  s.style.transform = "translateY("+dy+"px) rotate("+rot+"deg)";
  s.style.opacity = op;
  if(Math.random() < 0.05) s.style.textShadow = "0.4px 0 currentColor"; // heavy strike
  return s;
}

function scrollDown(){
  window.scrollTo({top: document.body.scrollHeight, behavior:"auto"});
}

function stepPrint(){
  if(queue.length === 0){ printing = false; setBusy(false); return; }
  printing = true; setBusy(true);
  const item = queue[0];
  if(item.text.length === 0){ queue.shift(); stepPrint(); return; }
  const c = item.text[0];
  item.text = item.text.slice(1);
  if(item.text.length === 0) queue.shift();

  if(c === "\n"){
    ensureLine(item.cls);
    if(curLine.childNodes.length === 0) curLine.innerHTML = "&nbsp;";
    curLine = null;
    clack(true);
    scrollDown();
  } else {
    ensureLine(item.cls);
    curLine.appendChild(jitterSpan(c, item.cls));
    if(c !== " ") clack(false);
  }
  head.remove(); paper.appendChild(head);
  if(curLine) curLine.appendChild(head);
  setTimeout(stepPrint, 1000/cps * (c==="\n" ? 3.2 : 1));
}

function print(text, cls){
  queue.push({text:String(text), cls:cls||""});
  if(!printing) stepPrint();
}
function println(text, cls){ print((text||"")+"\n", cls); }

function flush(){
  // dump the whole queue instantly
  while(queue.length){
    const item = queue.shift();
    for(const c of item.text){
      if(c === "\n"){
        ensureLine(item.cls);
        if(curLine.childNodes.length === 0) curLine.innerHTML = "&nbsp;";
        curLine = null;
      } else {
        ensureLine(item.cls);
        curLine.appendChild(jitterSpan(c, item.cls));
      }
    }
  }
  head.remove();
  if(curLine) curLine.appendChild(head); else paper.appendChild(head);
  printing = false; setBusy(false);
  scrollDown();
}

function setBusy(b){
  sendBtn.disabled = b;
}

/* =================================================================
   SOUND — tiny synthesized teletype
   ================================================================= */
function initAudio(){
  if(audio) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  audio = new AC();
}
function clack(isReturn){
  if(!soundOn || !audio) return;
  const t = audio.currentTime;
  const dur = isReturn ? 0.05 : 0.014;
  const buf = audio.createBuffer(1, audio.sampleRate*dur, audio.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = audio.createBufferSource(); src.buffer = buf;
  const bp = audio.createBiquadFilter();
  bp.type = "bandpass"; bp.frequency.value = isReturn ? 420 : 2100; bp.Q.value = 1.4;
  const g = audio.createGain(); g.gain.value = isReturn ? 0.35 : 0.16;
  src.connect(bp).connect(g).connect(audio.destination);
  src.start(t);
}
function dingBell(){
  if(!soundOn || !audio) return;
  const t = audio.currentTime;
  const o = audio.createOscillator();
  o.type = "triangle"; o.frequency.setValueAtTime(1975, t);
  const g = audio.createGain();
  g.gain.setValueAtTime(0.32, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
  o.connect(g).connect(audio.destination);
  o.start(t); o.stop(t+0.62);
}

const MON = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
function date77(){
  const n = new Date();
  return n.getDate()+"-"+MON[n.getMonth()]+"-77";
}
function time77(){
  const n = new Date();
  return String(n.getHours()).padStart(2,"0") + ":" +
         String(n.getMinutes()).padStart(2,"0") + ":" +
         String(n.getSeconds()).padStart(2,"0");
}
function prev77(){
  const n = new Date(Date.now() - 86400000);
  return n.getDate()+"-"+MON[n.getMonth()]+"-77";
}

function prompt(){ println(""); print("@"); }

function execCommand(raw){
  const line = raw.trim().toUpperCase();
  const [cmd, arg] = line.split(/\s+/);
  println("");
  switch(cmd){
    case "HELP": case "?":
      println(HELP_TEXT); break;
    case "SYSTAT": case "WHO":
      println(systat()); break;
    case "HOSTS":
      println(HOSTS_TEXT); break;
    case "MAP":
      println(MAP_TEXT); break;
    case "WAKE":
      wake(); return;
    case "MAIL": case "READMAIL":
      println(mailText()); break;
    case "DAYTIME": case "DATE": case "TIME":
      println(" "+date77()+" "+time77()+" EST"); break;
    case "RFC": case "FTP":
      if(arg && RFC_DOCS[arg]){ println(RFC_DOCS[arg]); }
      else if(arg && RFC_NOTES[arg]){ println("RFC "+arg+" -- OPERATOR'S NOTE:\n\n"+RFC_NOTES[arg]+"\n"); }
      else if(arg){ println("?NO NOTE ON RFC "+arg+".  THE NIC MAY KNOW MORE.\n"); }
      else println(RFC_INDEX);
      break;
    case "BELL":
      dingBell(); println("DING."+(soundOn?"":"  (THE SOUND SWITCH IS OFF, SO YOU\nWILL HAVE TO TAKE MY WORD FOR IT.)")); break;
    case "LORE":
      println(LORE_TEXT); break;
    case "ADVENT": case "ADVENTURE":
      startAdvent(); return;
    case "XYZZY":
      println("NOT HERE.  BUT KEEP THAT WORD SOMEWHERE SAFE."); break;
    case "LOGOUT": case "BYE": case "QUIT":
      logout(); return;
    case "":
      break;
    default:
      println("?ILLEGAL COMMAND -- "+cmd+"\n(TYPE HELP FOR THE SHORT LIST.)");
  }
  prompt();
}

 DEBRIS:{

let adv = null;

function startAdvent(){

          items:{ BUILDING:["LAMP"], DEBRIS:["TAPE"] } };

}
function advPrompt(){ println(""); print("> "); }

function canSee(){
  const r = ROOMS[adv.room];
  return !r.dark || (adv.lampOn && adv.inv.includes("LAMP"));
}
function lookRoom(force){
  const r = ROOMS[adv.room];
  if(!canSee()){
    println("IT IS PITCH DARK.  SOMETHING WITH TOO MANY LEGS\nIS FAINTLY AUDIBLE.  YOU'D BEST NOT WANDER.\n(THE LAMP, PERHAPS?  'ON'.)");
    return;
  }
  println(r.desc);
  const here = adv.items[adv.room] || [];
  if(here.includes("LAMP")) println("\nA SHINY BRASS LAMP SITS ON THE FLOOR.");
  if(here.includes("TAPE")) println("\nA REEL OF MAGNETIC TAPE LIES HERE, STENCILED\n'BACKUPS -- DO NOT LOSE'.");
}

function advCommand(raw){
  const line = raw.trim().toUpperCase().replace(/\b(THE|A|AN|TO)\b/g," ").replace(/\s+/g," ").trim();
  const parts = line.split(" ");
  let v = parts[0] || "", o = parts[1] || "";
  if(v === "GO"){ v = o; o = ""; }
  const DIRS = {N:"N",NORTH:"N",S:"S",SOUTH:"S",E:"E",EAST:"E",W:"W",WEST:"W",
                U:"U",UP:"U",D:"D",DOWN:"D",IN:"IN",ENTER:"IN",OUT:"OUT",EXIT:"OUT"};
  println("");

  if(v in DIRS){
    if(!canSee() && ROOMS[adv.room].dark){
      println("BLUNDERING IN THE DARK IS HOW LEGENDS END\nBADLY.  YOU STAY PUT.");
    } else {
      const dest = ROOMS[adv.room].exits[DIRS[v]];
      if(dest){ adv.room = dest; lookRoom(); checkWin(); }
      else println("THERE IS NO WAY "+(DIRS[v].length===1?"TO THE "+({N:"NORTH",S:"SOUTH",E:"EAST",W:"WEST",U:"UP",D:"DOWN"}[DIRS[v]]||DIRS[v]):DIRS[v])+" FROM HERE.");
    }
  }
  else if(v === "LOOK" || v === "L"){ lookRoom(true); }
  else if(v === "INVENTORY" || v === "INV" || v === "I"){
    println(adv.inv.length ? "YOU ARE CARRYING:\n  "+adv.inv.join("\n  ") : "YOU ARE CARRYING NOTHING BUT RESPONSIBILITY.");
  }
  else if(v === "TAKE" || v === "GET"){
    const here = adv.items[adv.room] || [];
    if(!canSee()){ println("YOU GROPE AROUND AND FIND ONLY REGRET."); }
    else if(o && here.includes(o)){
      here.splice(here.indexOf(o),1); adv.inv.push(o);
      println(o+": TAKEN."+(o==="TAPE"?"\n\nSOMEWHERE FAR ABOVE, AN OPERATOR'S SHOULDERS\nUNTENSE, NOT KNOWING WHY.":""));
    }
    else println(o ? "NO "+o+" HERE." : "TAKE WHAT?");
  }
  else if(v === "DROP"){
    if(o && adv.inv.includes(o)){
      adv.inv.splice(adv.inv.indexOf(o),1);
      (adv.items[adv.room] = adv.items[adv.room] || []).push(o);
      println(o+": DROPPED.");
      checkWin();
    } else println(o ? "YOU HAVE NO "+o+"." : "DROP WHAT?");
  }
  else if(v === "ON" || (v==="LIGHT" && (o==="LAMP" || !o))){
    if(!adv.inv.includes("LAMP")) println("YOU HAVE NO LAMP.  THE DARK REMAINS COMMITTED.");
    else if(adv.lampOn) println("THE LAMP IS ALREADY LIT.");
    else { adv.lampOn = true; println("THE LAMP GIVES A WARM, DUTIFUL LIGHT."); println(""); lookRoom(true); }
  }
  else if(v === "OFF"){
    if(adv.lampOn){ adv.lampOn = false; println("THE LAMP GOES OUT.  BOLD."); }
    else println("THE LAMP IS ALREADY OFF.");
  }
  else if(v === "XYZZY"){
    if(adv.room === "GRATE"){
      adv.room = "DEBRIS";
      println(">> FOOMP <<\n\nTHE WORLD FOLDS ALONG A SEAM YOU NEVER NOTICED.");
      println("");
      lookRoom();
    } else if(adv.room === "DEBRIS"){
      adv.room = "GRATE";
      println(">> FOOMP <<  (THE OTHER WAY, THIS TIME.)");
      println("");
      lookRoom(true);
    } else {
      println("YOU SAY THE WORD.  NOTHING HAPPENS.  THE WORD,\nIT SEEMS, IS PARTICULAR ABOUT VENUES.");
    }
  }
  else if(v === "OPEN" && o === "GRATE"){ println("RUSTED SHUT PAST ALL ARGUMENT.  THE FRAME'S\nGRAFFITI MAY BE MORE THAN GRAFFITI."); }
  else if(v === "HELP"){ println("VERBS: GO <DIR>, LOOK, TAKE, DROP, INVENTORY,\nON, OFF, QUIT.  READ WALLS.  TRUST GRAFFITI."); }
  else if(v === "QUIT" || v === "Q"){
    println("LEAVING THE CAVE AS FOUND (MORE OR LESS).");
    endAdvent(); return;
  }
  else if(v === ""){ /* nothing */ }
  else println("I DO NOT KNOW HOW TO '"+v+"' SOMETHING.");

  advPrompt();
}

function checkWin(){
  if(adv.won) return;
  const here = adv.items[adv.room] || [];
  if(adv.room === "BUILDING" && here.includes("TAPE")){
    adv.won = true;
    println("");
    println("THE TAPE IS SAFE INDOORS.  SOMEWHERE, AN\nOPERATOR WEEPS QUIETLY WITH JOY.");
    println("");
    println("*** YOU HAVE RECOVERED THE BACKUPS ***");
    println("");
    println("SCORE: 350 OF A POSSIBLE 350.");
    println("CLASS: WORKING SYSADMIN, WHICH OUTRANKS WIZARD.");
    println("");
    println("(Q TO RETURN TO THE EXEC, OR KEEP EXPLORING.)");
  }
}

function submit(){
  if(printing || mode === "dead") return;
  const raw = kb.value;
  kb.value = "";
  echoUser(raw, ()=>{
    if(mode === "advent") advCommand(raw);
    else execCommand(raw);
  });
}
function echoUser(text, then){
  // print the operator's keystrokes in their own ink, then act
  const up = text.toUpperCase();
  queue.push({text: up + "\n", cls:"usr"});
  if(!printing) stepPrint();
  waitIdle(then);
}
function waitIdle(fn){
  const t = setInterval(()=>{
    if(!printing){ clearInterval(t); fn(); }
  }, 40);
}

/* quick command chips */
const chipsEl = document.getElementById("chips");
function setChips(defs){
  chipsEl.innerHTML = "";
  defs.forEach(([label,fn])=>{
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = label;
    b.addEventListener("click", fn);
    chipsEl.appendChild(b);
  });
}
function cmdChip(cmd){
  return [cmd, ()=>{
    if(printing || mode === "dead") return;
    echoUser(cmd, ()=>{
      if(mode === "advent") advCommand(cmd);
      else execCommand(cmd);
    });
  }];
}

}
