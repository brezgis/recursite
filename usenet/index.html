<style>
  :root{
    --phos:#3dff70;
    --phos-dim:#1d8f42;
    --glow:0 0 6px rgba(61,255,112,.55), 0 0 1px rgba(61,255,112,.9);
    --bg:#04120a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{background:var(--bg)}
  body{
    font-family:"SFMono-Regular",Menlo,Consolas,"Liberation Mono","Courier New",monospace;
    background:var(--bg);
    overflow:hidden;
  }
  /* the tube: everything lives on the glass */
  #tube{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    background:
      radial-gradient(140% 110% at 50% 40%, rgba(255,255,255,.045) 0%, transparent 55%),
      var(--bg);
    animation:flick 7s infinite steps(1), poweron .9s ease-out 1;
  }
  @keyframes flick{
    0%,93%,100%{opacity:1}
    94%{opacity:.968}
    95%{opacity:.994}
    96.5%{opacity:.975}
  }
  @keyframes poweron{
    0%{filter:brightness(0)}
    12%{filter:brightness(2.6) blur(2px)}
    40%{filter:brightness(.7) blur(.6px)}
    100%{filter:brightness(1)}
  }
  /* glass artifacts, full bleed, above everything, never intercept */
  #scan,#vig{position:fixed;inset:0;pointer-events:none}
  #scan{
    z-index:8;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  #vig{
    z-index:9;
    background:radial-gradient(120% 105% at 50% 45%, transparent 64%, rgba(0,0,0,.6) 100%);
  }
  /* the text plane: full-height scroller, 76-column reading width on big glass */
  #screen{
    flex:1 1 auto;min-height:0;
    overflow-y:auto;
    padding:2.2vh max(14px, calc((100% - 78ch)/2)) 3vh;
    color:var(--phos);
    text-shadow:var(--glow);
    font-size:clamp(9.5px,2.45vw,15.5px);
    line-height:1.42;
    white-space:pre-wrap;
    word-break:break-word;
    scrollbar-width:thin;
    scrollbar-color:var(--phos-dim) transparent;
  }
  #screen:focus{outline:none}
  .row{display:block;cursor:pointer;border-radius:1px}
  /* menu rows clip at the screen edge, like a real 80-column terminal */
  .trunc{display:block;white-space:pre;overflow:hidden}
  .row:hover,.row:focus-visible{background:rgba(61,255,112,.14);outline:none}
  .row:focus-visible{box-shadow:0 0 0 1px var(--phos-dim)}
  .dim{opacity:.62}
  .inv{background:var(--phos);color:var(--bg);text-shadow:none;padding:0 2px}
  .hdr{opacity:.78}
  .cursor::after{content:"█";animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){
    #tube{animation:none}
    .cursor::after{animation:none}
  }
  /* soft keys: drawn in phosphor, part of the screen */
  #softkeys{
    flex:0 0 auto;
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    padding:6px max(10px, calc((100% - 78ch)/2));
  }
  .key{
    background:transparent;
    border:1px solid var(--phos-dim);
    color:var(--phos);text-shadow:var(--glow);
    font:inherit;font-size:clamp(10px,2.3vw,13px);
    letter-spacing:.06em;
    padding:7px 10px;min-width:44px;cursor:pointer;
    border-radius:1px;
  }
  .key b{font-weight:bold}
  .key:hover{background:rgba(61,255,112,.14)}
  .key:active{background:var(--phos);color:var(--bg);text-shadow:none}
  .key:focus-visible{outline:1px solid var(--phos);outline-offset:2px}
  /* status line: one row of inverse video, bottom of the tube */
  #status{
    flex:0 0 auto;
    padding:3px max(14px, calc((100% - 78ch)/2)) calc(3px + env(safe-area-inset-bottom));
    background:var(--phos);
    color:var(--bg);
    font-size:clamp(9.5px,2.45vw,13.5px);
    letter-spacing:.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .fx-off #scan,.fx-off #vig{display:none}
  .fx-off #tube{animation:none}
  .fx-off #screen,.fx-off .key{text-shadow:none}
</style>

const GROUPS = [
{ name:"net.general", desc:"*Important* and timely announcements", arts:[
{ real:true, from:"chernenko@kremvax.UUCP (K. Chernenko)", path:"brezvax!decvax!mcvax!moskvax!kremvax!chernenko",
pv:"version B 2.10.1 4/1/83 (SU840401); site kremvax.UUCP",
org:"MIIA, Moscow", groups:"net.general,eunet.general,net.politics,eunet.politics",
subj:"USSR on Usenet", date:"Sun, 1-Apr-84 11:02:52 EST", id:"<0001@kremvax.UUCP>",
body:
`Well, today, 840401, this is at last the Socialist Union of Soviet
Republics joining the Usenet network and saying hallo to everybody.

One reason for us to join this network has been to have a means of
having an open discussion forum with the American and European people
and making clear to them our strong efforts towards attaining peaceful
coexistence between the people of the Soviet Union and those of the
United States and Europe.

We have been informed that on this network many people have given strong
anti-Russian opinions, but we believe they have been misguided by their
leaders, especially the American administration, who is seeking for war
and domination of the world.
By well informing those people from our side we hope to have a possibility
to make clear to them our intentions and ideas.

Some of those in the Western world, who believe in the truth of what we
say have made possible our entry on this network; to them we are very
grateful. We hereby invite you to freely give your comments and opinions.

Here are the data for our backbone site:

Name: moskvax
Organization: Moscow Institute for International Affairs
Contact: K. Chernenko
Phone: +7 095 840401
Postal-Address: Moscow, Soviet Union
Electronic-Address: mcvax!moskvax!kremvax!chernenko
News: mcvax kremvax kgbvax
Mail: mcvax kremvax kgbvax

And now, let's open a flask of Vodka and have a drink on our entry on
this network. So:

            NA ZDAROVJE!

--
    K. Chernenko, Moscow, USSR
    ...{decvax,philabs}!mcvax!moskvax!kremvax!chernenko`},
{ real:true, from:"bobr@zeus.UUCP (Robert Reed)", path:"brezvax!decvax!ihnp4!zehntel!tektronix!teklds!zeus!bobr",
pv:"version B 2.10.1 (Tek) 9/26/83; site zeus.UUCP",

`--------
I can't believe the upset that the April fool's Usenet announcement has
caused.  I think I can count myself among the majority at our site who
viewed the obvious fraud with admiration.  Did you seriously believe that a
K. Chernenko at moskvax!kremvax really exists?  kremvax?  moskvax?  Come on!

I would like to thank whoever sent it as a good jest, well executed and not
harmful in any way.
--
Robert Reed, Tektronix Logic Design Systems, tektronix!teklds!bobr`},
{ real:true, from:"inc@fluke.UUCP (Gary Benson)", path:"brezvax!decvax!ihnp4!zehntel!tektronix!uw-beaver!ssc-vax!fluke!inc",
pv:"version B 2.10.1 Fluke 1/4/84; site fluke.UUCP",
org:"John Fluke Mfg. Co., Everett, WA", refs:"<67@hwcs.UUCP>",
subj:"re: USSR on Usenet", date:"Fri, 6-Apr-84 13:26:57 EST", id:"<238@tpvax.fluke.UUCP>",
body:
`I want to voice my support of those who feel that the "April Fool's" joke
about the USSR on the USENET was bad form. Particularly when it appeared in
what many of us had come to rely on as the authoritative source for nuews
about the network.

Perhaps the perpetrator should be asked to pay all those long-distance phone
bills that resulted when many people (apparently) responded to this article
seriously and with a sense of the beginning of the start of a great
adventure in international communication.

Perhaps that individual should also be informed that April Fool's Day is not
the widespread celebration (?) that we in the US, in our culturo-centric
way, may sometimes think it is.

It looks as if there is at least one fool on this network.

--
From the ever smiling,			 .).
ever happy fingers of:		          V

 Gary Benson		     +				+
 John Fluke Mfg. Co.	      ILLEGITIMI NON CARBORUNDUM
 !fluke!inc		     +			        +`},
{ real:true, from:"dave@infopro.UUCP (David Fiedler)", path:"brezvax!decvax!harpo!infopro!dave",
pv:"version B 2.10 5/3/83; site infopro.UUCP",
org:"InfoPro Systems, Denville, NJ",
subj:"RE: Russia on the Net", date:"Sun, 8-Apr-84 18:14:14 EST", id:"<56@infopro.UUCP>",
body:
`<food for thought>

There have been some people who thought that planting of this rather
hilarious piece was somehow in "bad taste", because they genuinely thought
a new era of Soviet-U.S. cooperation was at hand. Perhaps we should take
another look at some of the text of the original posting...

>> We have been informed that on this network many people have given strong
>> anti-Russian opinions, but we believe they have been misguided by their
>> leaders, especially the American administration, who is seeking for war
>> and domination of the world.
>> ...
>> Some of those in the Western world, who believe in the truth of what we
>> say have made possible our entry on this network; to them we are very
>> grateful. We hereby invite you to freely give your comments and opinions.

If this were taken at face value, the meaning could roughly be translated as
follows:

    While export to Warsaw Pact countries of advanced computers that
    could be used for military purposes, such as the VAX, has been
    prohibited, someone in league with us at the Kremlin has procured
    one for us [tantamount in this sense to bringing them the plans for
    one of our fighters -- DF]. We always knew you foolish capitalists
    would sell us the rope to hang you with! The war-mongering Reagan
    and all his dupes had better watch out, since we now have access to
    Arpanet and could probably break security on every computer on Usenet
    as well...after all, you people never *really* thought security was
    important, did you?

While I'm as much in favor of TRUE Soviet-American cooperation on all fronts
(including the eventual reduction of arms) as the next person, let's keep a
perspective. Soviet access to the VAX would be a very serious matter, and
just how secure WOULD you feel if the KGB could not only read your postings
(some of which are quite revealing at times) but maybe get into your
system? There ARE security holes, you know...
"That's the biz, sweetheart..."
          Dave Fiedler
{harpo,astrovax,philabs}!infopro!dave
P.S. You also might consider that the NSA and CIA have access to the net.`},
{ real:true, from:"rbanerji@sjuvax.UUCP (R. Banerji)", path:"brezvax!decvax!akgua!psuvax!burdvax!sjuvax!rbanerji",
pv:"version B 2.10.1 6/24/83; site sjuvax.UUCP",
org:"Saint Josephs Univ. Phila., Pa.",
subj:"USSR once more", date:"Wed, 18-Apr-84 14:59:57 EST", id:"<269@sjuvax.UUCP>",
body:
`So far I havenot seen the following point of view expressed, except once
in some anger from Edinburgh.

A normal user, if he pulled this joke, would have caused his root to
scratch his or her head and take steps to protect the confidential
system files. So, in making this joke, a superuser was definitely using
his power (and the trust with which the power was given) to pull the
joke.

Should power be used in jest? Depends, right? Would it be OK if everyubody
lost their files for half an hour at 10 am, April 1? But he didnot do that.
Right? If the president of the US (after duly informing France), went on
national TV and declared that we are now at war with France, it wouldnot
be appreciated, right? What if he appered on TV and dissolved the national
debt?

How much power can be used to what extent in jest is not an easy question
to answer. I am asking, should a superuser tramper with a ystem file in
jest?`}

{ real:true,
from:"trt@rti-sel.UUCP",
path:"brezvax!decvax!clyde!floyd!harpo!decvax!mcnc!rti!rti-sel!trt",
subj:"Making uucp/news go faster",
date:"Sat, 24-Mar-84 10:29:28 EST",
id:"<1104@rti-sel.UUCP>",
body:
"Here is a performance hack that did not make it into 4.2 uux:\n\tif (argc > 2) {\t/* rti-sel!trt: avoid gwd() for trivial case (rnews) */\n\t\tret = gwd(Wrkdir);\n\t\tif (ret != 0) {\n\t\t\tfprintf(stderr, \"can't get working directory; will try to continue\\n\");\n\t\t\tstrcpy(Wrkdir, \"/UNKNOWN\");\n\t\t}\n\t}\n\tDEBUG(4, \"\\n\\n** %s **\\n\", \"START\");\n[Note: the placement of this code is important.  The old ``gwd'' code\nappears later in uux and should be removed.]\nAvoiding the ``gwd'' call avoids a fork(II), an exec(II) of sh(I),\nanother fork(II), an exec(II) of pwd(I), and a few other things.\n(The performance effect was never measured.  After all, it's a hack.)\n\nAlas, Mark Horton's speedup-by-sleeping hack never got into 4.2 uucp either.\nBut I am not convinced it helps.  Anyone care to rerun Mark's tests of it?\n\nI think what really ticks people off is that letters can get hung up\nfor hours waiting for uucico/uuxqt to finish processing all the news.\nUsing Mark Horton's ``grade'' option helps the uucico part,\nbut uuxqt never sees the grade information when it is ordering\nthe X. files for processing.\nThat has been fixed in Honey DanBer uucp, probably with a hack to uux\nto include the grade letter in the 'X.' filename.\n\nAs for phone line overhead, the only ease cure is to batch news\ninto small numbers of large files, and ship those.\nHere is what uucico does to ship a *single* file:\n\tMaster:\tI wanna send D.rti-selB1234\t(70 bytes)\n\tSlave:\tOK\t\t\t\t(70 bytes!!)\n\tMaster:\t... here is the file ...\t(N bytes + ~32 bytes slop)\n\tSlave:\tTNX\t\t\t\t(70 bytes!!)\nEven with zero dead time the overhead is substantial at 1200 baud.\nA uux-shipped news article requires sending an 'X.' and a 'D.'.\nSome batching schemes do not send an 'X.' but still send each\narticle as a separate 'D.'.  To save phone time the articles\nshould be concatenated (and compressed) into large files.\nWouldn't it be nice if there were a ``uubatch'' command\nwith syntax and semantics essentially identical to ``uux''?\nAh well, there's never time to code but there's always time to flame.\n\tTom (\"still waiting for a fix\") Truscott"},
{ real:true,
from:"jc@inmet.UUCP",

"#R:seismo:-87500:inmet:6700011:177600:687\ninmet!jc    Apr 20 17:14:00 1984\n\n\n\n\n> version B 2.10.1 4/1/83 (SU840401)\n> \tkremvax.UUCP\t\n\nReally?  They must have been fast workers, to bring it up on April first\nand submit a message the same day.  Who'd have ever thought those bureaucratic \ntypes could have even plugged in a terminal in less than a day!\n\nCongratulations, either to the originator of this hoax, or to the kremvax\nsystem administrators, for a job well done!  I hope to read many interesting\nsubmissions from their address.  How about a followup on the mammontelephas,\nfor a starter?\n\n\t\t\t\t\tJohn M Chambers [inmet!jc]\n\t\t\t\t\tIntermetrics, Inc.\n\t\t\t\t\t735 Concord Ave.\n\t\t\t\t\tCambridge, MA 02138\n\"I don't have any solution but I certainly admire the problem.\""},
{ real:true,
from:"warren@ihnss.UUCP (Warren Montgomery)",
path:"brezvax!decvax!harpo!ulysses!mhuxl!ihnp4!ihnss!warren",
pv:"version B 2.10.1 exptools 1/6/84; site ihnss.UUCP",
org:"AT&T Bell Labs, Naperville, IL",
subj:"Proliferation of old topics",
date:"Tue, 24-Apr-84 11:52:32 EST",
id:"<2047@ihnss.UUCP>",
body:
"The worst aspect that I have seen of the flooding of the network\nwith old netnews is that one or two very old articles will look new\nto people and revive a long dead debate.  The best solution is, of\ncourse, to build more safeguards into the distribution mechanism in\norder to prevent single failures from causing a flood of old news. \nI would like to raise a couple of suggestions in order to try to\nprevent it:\n\n1)\tBuild in a check into rnews to refuse to accept news with a\n\tsubmission date older than 2-3 weeks.  This would be severe,\n\tbut would certainly catch a lot of errors.\n\n2)\tBuild in a warning into readnews and vnews for any attempt\n\tto follow up on very old articles.  Users should be allowed\n\tto issue such followups IF THEY REALLY WANT TO, but it would\n\tprobably cut down on the number of followups to dea subjects\n\tto have some warning for a posting that would do so.\n\t\nI have watched netnews grow from a dozen sites and a dozen\nnewsgroups to it's current global size.  I am amazed that this has\nbeen accomplished so smoothly, and hope we can look forward to\nfurther smooth growth.  As the news load grows and the network\nbecomes more widespread, preventing the proliferation of useless\narticles (this is not a commentary on the contents of the news, I\nmean really useless stuff, like duplicates) will be an increasingly\ncritical problem.\n\n-- \n\n\tWarren Montgomery\n\tihnss!warren\n\tIH x2494"},
]},

{ name:"net.columbia", desc:"The space shuttle and the STS program", arts:[
{ real:true, from:"alb@alice.UUCP (Adam L. Buchsbaum)", path:"brezvax!decvax!ihnp4!allegra!alice!alb",
pv:"version B 2.10.1 6/24/83; site alice.UUCP",
org:"AT&T Bell Laboratories, Murray Hill",
subj:"41C Coming to a Close", date:"Thu, 12-Apr-84 20:59:05 EST", id:"<2713@alice.UUCP>",
body:
`With an empty cargo bay, NASA's symbol of success for
this mission, the crew of 41C prepared to come home
tomorrow.  Landing is set for 0707 EST, 13 April,
at KSC.  If there is early ground fog, the landing
can be postponed one orbit, until 0847 EST.

41D, the debut mission of the Discovery, is due to
launch on 19 June.`},
{ real:true, from:"ralph@inuxc.UUCP (Ralph Keyser)", path:"brezvax!decvax!ihnp4!inuxc!ralph",
pv:"version B 2.10.1 6/24/83; site inuxc.UUCP",
org:"AT&T Consumer Products Div., Indianapolis", refs:"<93@brl-vgr.ARPA> <2706@alice.UUCP>",
subj:"Re: The Final Definitive Answer on the Fuel Question", date:"Fri, 13-Apr-84 12:46:03 EST", id:"<946@inuxc.UUCP>",
body:
`A couple of additional points:
1) The "red-line" on the MMU was pretty high. Nelson had just under
   50% of his fuel remaining when he returned to the shuttle.
2) The shuttle is the second backup in the event of an MMU failure.
   If an astronaut has an MMU failure, then either the shuttle itself
   or another crew member in the second MMU would go for the rescue.
   Because the shuttle was low on fuel (down to 21% in the forward RCS)
   [See Adam's article for more details], the second MMU was tested
   inside the cargo bay only. Ox did the flying on that one.

CNN provides much better coverage of inflight events than the
networks. They were very clear about the entire fuel issue and what
it meant to the mission.

				Ralph Keyser
				ihnp4!inuxc!ralph`},
{ real:true, from:"johnnyr@ihuxa.UUCP (John R. Rosenberg)", path:"brezvax!decvax!ihnp4!ihuxa!johnnyr",
pv:"version B 2.10.1 exptools 1/6/84; site ihuxa.UUCP",
org:"AT&T Bell Labs, Naperville, IL",
subj:"Getting it back to the Cape", date:"Fri, 13-Apr-84 09:52:50 EST", id:"<474@ihuxa.UUCP>",
body:
`This may be a naive question, but I thought I'd ask, just to
satisfy my curiosity...

Since they landed this morning out at Edwards instead of at the Cape, they
will be piggy-backing the shuttle on their 747. Has any thought ever been
given to refueling in CA. and flying it back under its own power? I
guess what my question really asks is... Does the shuttle have the
capability to fly under power (well throttled down) as a normal
airplane. Is there enough control, too much power ....???

Probably a stupid question, I know. But just a random thought that
stuck in my head this morning.

                               John Rosenberg  AT&T Technologies
                         ihnp4!ihuxa!johnnyr   Naperville Il.`},
{ real:true, from:"alb@alice.UUCP (Adam L. Buchsbaum)", path:"brezvax!decvax!ihnp4!allegra!alice!alb",
pv:"version B 2.10.1 6/24/83; site alice.UUCP",
org:"AT&T Bell Laboratories, Murray Hill", refs:"<474@ihuxa.UUCP>",
subj:"Re: Getting it back to the Cape", date:"Sun, 15-Apr-84 10:18:20 EST", id:"<2717@alice.UUCP>",
body:
`1) The main engines cannot be reused until they are refurbished,
   a process that takes a week or two.  (Note, the countdown can
   be halted at any point up until the SRB's ignite; if it is
   halted AFTER the main engines ignite, the launch would be
   delayed for about two weeks until the ME's could be refurbished
   (basically cleaned up).)

2) There is no launch facility at Edwards, and the shuttle cannot
   take off horizontally.

3) Which do you think costs more?  A jumbo jet ride across the
   country, using commercial airline fuel, or a shuttle ride,
   consuming half a million gallons of liquids hydrogen and
   oxygen (not to mention the cost of an external tank)?`},
{ real:true,

{ name:"net.unix-wizards", desc:"Discussions, bugs, fixes on and for UNIX", arts:[
{ real:true,
from:"johnl@haddock.UUCP",
path:"brezvax!decvax!clyde!akgua!mcnc!decvax!cca!ima!haddock!johnl",
subj:"Re: silly comment - (nf)",
date:"Fri, 20-Apr-84 23:43:14 EST",
id:"<156@haddock.UUCP>",
body:
"#R:sri-arpa:-1210000:haddock:16800011:000:658\nhaddock!johnl    Apr 20 15:08:00 1984\n\nThe \"comet sucks\" comment in the 4BSD printf routine refers to the\nannoying fact that the Vax 750 \"movtuc\" instruction, which used to be\nin printf's inner loop, doesn't work right and sprays crud all over\nmemory at inconvenient times.\n\nActually, movtuc turned out to have two bugs in it.  Bill Joy found one,\nadded the comment, and fiddled the code a little but didn't take out the\nmovtuc.  I found the other and completely removed the movtuc.\n\nThe ramifications were pretty strange.  While fighting that bug, I tried\nrecompiling the C compiler, and it took three iterations until it converged\nto the same object code twice in a row.\n\nJohn Levine, ima!johnl"},
{ real:true,
from:"guido@mcvax.UUCP",
path:"brezvax!decvax!clyde!akgua!mcnc!decvax!harpo!ulysses!mhuxl!houxm!hogpc!houti!ariel!vax135!floyd!cmcl2!philabs!mcvax!guido",
pv:"version B 2.10.1 6/24/83 (MC840302); site mcvax.UUCP",
org:"\"Stamp Out BASIC\" Committee, CWI, Amsterdam",
refs:"<137@utecfa.UUCP> <1277@cbosgd.UUCP>",
subj:"Re: MAJOR BUG (Mark Horton's reply)",
date:"Fri, 20-Apr-84 10:08:39 EST",
id:"<5784@mcvax.UUCP>",
body:
"It was very honorable of Mark Horton to admit his \"guilt\"; but I'm not\nconvinced by His reply.\n\n>Why do you assume this is a bug?  It was put in as a feature [...].\n\nAt most I'd call it a quick hack, especially given the bad quality of the\ncode (pointed out by another unix-wizard) and the absence of documentation.\n\n>EMACS has a similar feature.\n\nNo it hasn't.  There is no way to specify IN THE FILE you are editing\nthat certain Emacs commands must be performed.  You specify this in the\nset-up file by binding commands to certain filenames.  (At least that's\nthe situation in Gosling's Emacs.)  This way it is only you who decides\nwhat's be done (if you trust Emacs itself).\n\n>[...] you seem to have found a security problem.\n\nI can't believe you didn't think of that when you invented it.\n\nEnough flaming; the gentleman who proposed to have a flag \"modeline\"\nwhich turns the feature on (default off) has my warm approval.\n\n--\n\tGuido van Rossum, \"Stamp Out BASIC\" Committee, CWI, Amsterdam\n\tguido @ mcvax"},
{ real:true,
from:"topher@cyb-eng.UUCP (Topher Eliot)",
path:"brezvax!decvax!clyde!akgua!mcnc!decvax!harpo!seismo!ut-sally!cyb-eng!topher",
pv:"version B 2.10.1 6/24/83; site cyb-eng.UUCP",
org:"Cyb Systems, Austin, Texas",
refs:"<12175@sri-arpa.UUCP> <306@kpno.UUCP>",
subj:"/lib, /usr/lib, /usr/local/lib",
date:"Fri, 20-Apr-84 14:29:04 EST",
id:"<362@cyb-eng.UUCP>",
body:
"If my impression is correct, once upon a time there was /lib, where the\nlibraries were kept.  Then /usr/lib was added, for 'local stuff that isn't\npart of the standard system, but that we still want to make available to\neveryone on the machine', (well, ok, also for systems whose root disks\nwere too small.  But that doesn't occur very much these days).  For the\nsake of tidiness, I would love to throw away /usr/lib, /usr/bin, and all\nthe other 'duplicate' directories.  But I can't, because those pathnames\nare built into so many programs.\n\nSo now we have /usr/local/lib for 'local stuff that isn't part of the\nstandard system, but that we still want to make available to everyone on\nthe machine'.  Pretty soon that pathname will be compiled into lots of\nprograms, too.\n\nWhat's next?  /usr/local/REALLYlocal/lib?\n\nAm I missing something, or is this an undesirable trend?\n\nCheers,\nTopher Eliot\nCyb Systems, Austin, TX\nihnp4!ut-sally!cyb-eng!topher"},
{ real:true,
from:"alanr@drutx.UUCP (RobertsonAL)",
path:"brezvax!decvax!clyde!burl!ulysses!mhuxl!ihnp4!drutx!alanr",
pv:"version B 2.10.1 (Denver Mods 4/2/84) 6/24/83; site drutx.UUCP",
org:"AT&T Information Systems Laboratories, Denver",
refs:"<451@burl.UUCP>",
subj:"Re: Root filesystem bad free list problem -- HELP!!  {whimper}",
date:"Thu, 26-Apr-84 17:35:12 EST",
id:"<227@drutx.UUCP>",
body:
"This is almost certainly due to a bug in the concurrency management\nin the UNIX free list handler.\nWe experienced the same problem here for two months!! on 3-8 machines\ninvolving PDP-11's running 3.0, vaxen and 3b-20's running System 5.\nIt is fixed in UNIX/370 (where concurrency is a BIG issue -- many\nusers, lots of CPUs, and a non single-thread kernel),\n\nand (if I recall correctly) the problem went like this:\n\t\n\t1)\tsuperblock free list runs out, and it \n\t\t\tbegins getting rebuilt by the O/S\nwhile\n\t2) someone allocates, then frees a block before 1 completes.\n\n\n\tThis fouls things up, since the free list is not locked\n\tfor the duration of the rebuild.\n\n\tUNIX/370 fixed this by locking the free list for the duration\n\t\tof 1) above.  This makes response time on the machine\n\t\toccasionally glitch, while the free list gets rebuilt.\n\nWe tried the goat, it had absolutely no effect (except for a residual\nsmell, we can't seem to get rid of).\n\nWe NEVER FIXED THE PROBLEM -- It came by itself, then it went away by\nitself, without us ever being able to track it down to the exact logic\nthat was causing the problem.  And we did try mightily.\nThe UNIX/370 folks I talked to indicated that this same problem exists\nin EVERY version of UNIX since Version 7.\n\nYou just get lucky almost all of the time, until you don't get lucky\nanymore.  If you want to file this problem with WECO, please call me,\nand we'll gladly substantiate your claim.  THIS OUGHT TO GET FIXED!!!\n\n\t-- Alan Robertson\n\t   ihnp4!drutx!alanr\n\t   AT&T Information Systems Laboratories\n\t   Denver, Colorado\n\t   Room 31Y-27, x4796"}
]},

{ name:"net.space", desc:"Space, space programs, space related research", arts:[
{ real:true,
from:"al@ames-lm.UUCP (Al Globus)",
path:"brezvax!decvax!clyde!floyd!harpo!seismo!hao!ames-lm!al",
pv:"version B 2.10.1 6/24/83; site ames-lm.UUCP",
org:"NASA-Ames Research Center, Mtn. View, CA",
refs:"<281@sri-arpa.UUCP>",
subj:"Re: NASA's Future",
date:"Fri, 30-Mar-84 21:25:35 EST",
id:"<190@ames-lm.UUCP>",
body:
"Everyone seems very exited about manned bases on the Moon and Mars.  \nThat's all well and good but I suspect that once we get used to space\nstations and space colonies we will turn up our noses at living on\nuninhabitable planets.  I mean, if you go to all the trouble\nto build a life support system, the least you want is permanent sunshine\nand control of gravity.\n\nHere I go out on a limb:\n\n\tManned presence on the Moon, Mars, et. al. will be a side show.\nThe real action is in orbit."},
{ real:true,
from:"wombat@uicsl.UUCP",
path:"brezvax!decvax!clyde!floyd!harpo!ulysses!mhuxl!ihnp4!inuxc!pur-ee!uiucdcs!uicsl!wombat",
pv:"Notesfiles; site uicsl.UUCP",
subj:"Interstellar Laser-Pushed Sails - (nf)",
date:"Wed, 11-Apr-84 14:47:00 EST",
id:"<11100023@uicsl.UUCP>",
body:
"#N:uicsl:11100023:000:846\nuicsl!wombat    Apr 11 13:47:00 1984\n\nThe latest *Journal of Rocketry and Spacecraft* has an article by Robert\nL. (*Dragon's Egg*) Forward on interstellar laser-pushed sails.\nHe gives details on an aluminum sail that would make it to Alpha Centauri\nin ~41 years. The laser would be focused through a Fresnel lens.\nThe sail comes in two main parts: a smaller sail with the payload,\nsurrounded by a sail with a larger surface area and a high reflectivity.\nAt a given point, they separate, and the larger sail is accelerated\naway from the payload sail, plus, its high reflectivity focuses light\nback on the other side of the payload sail, thus slowing it (the p.s.)\ndown for a leisurely glide into the Alpha Centauri system.\nHe also writes about a three stage sail that would go to Epsilon\nEridani and return, but I haven't read that far yet.\n\t\t\t\t\tWombat\n\t\t\t\t\tihnp4!uiucdcs!uicsl!wombat"},
{ real:true,
from:"ks@astrovax.UUCP (Karl Stapelfeldt)",
path:"brezvax!decvax!clyde!burl!ulysses!allegra!princeton!astrovax!ks",
pv:"version B 2.10.1 6/24/83; site astrovax.UUCP",
org:"Princeton Univ. Astrophysics",
subj:"Re: Arthur C. Clarke's 2010",
date:"Tue, 1-May-84 16:20:13 EDT",
id:"<321@astrovax.UUCP>",
body:
"I have just learned heard something absolutely terrible about the upcoming\nfilm \"2010: Odyssey 2\", and I heard it directly from Arthur himself (appearing\nat GWU SEDS April 30).  Arthur says that the writer of the screenplay for his\nfilm will be Peter Hyams.  Who is he, you say?  You're not going to like it.\nPeter Hyams wrote and directed \"Capricorn One\", the biggest piece of anti-space\nfilth ever brought to deface the silver screen.  And it wasn't a good adventure\nstory either, even if you don't mind the political intonations.  Arthur says\nthat he's never met Hyams, but will meet him soon.  Evidently MGM assigned him\nto the project.  My expectations for the film have dropped greatly.\n     We are also told that Tony Banks (??) will be writing an original score\nfor the film, i.e. not much old classical music will be used."}
]},

{ name:"net.micro", desc:"Micro computers of all kinds", arts:[
{ real:true,
from:"mmt@dciem.UUCP (Martin Taylor)",
path:"brezvax!decvax!utzoo!dciem!mmt",
pv:"version B 2.10.1 6/24/83; site dciem.UUCP",
org:"D.C.I.E.M., Toronto, Canada",
refs:"<7551@watmath.UUCP>",
subj:"Re: Well written Macintosh overview (comments on comments)",
date:"Tue, 17-Apr-84 17:38:07 EST",
id:"<860@dciem.UUCP>",
body:
"When the Mac was first announced officially, and could be seen here,\nthe people with most immediately enthusiastic responses were precisely\nthose people who have been deeply into computers for years.  They could\nappreciate the wonder of the Mac faster than the \"users\" (non-novice but\nnon-wizard).  Having been involved with computers for 30 years now, I\nfound myself with that quick \"This is a real machine -- it's RIGHT\" reaction.\nAfter 6 weeks of using one, my main finding is that now my writings\nhave many more figures in them and are easier to read.  No programming\nsupport yet, but what a joy it is to use the things that are there.\nProgramming will come.\n-- \n\nMartin Taylor\n{allegra,linus,ihnp4,uw-beaver,floyd,ubc-vision}!utzoo!dciem!mmt"},
{ real:true,
from:"dmt@hocsl.UUCP",
path:"brezvax!decvax!clyde!burl!ulysses!mhuxl!houxm!hogpc!pegasus!hocsl!dmt",

org:"AT&T Information Systems Labs, Holmdel NJ",
subj:"Unplanned April Foolery in BYTE",
date:"Mon, 23-Apr-84 08:17:38 EST",
id:"<118@hocsl.UUCP>",
body:
"I wonder if the editors of BYTE ever read the ads they print.\nA few amusing examples from the April issue:\n    -\tTwo competitive manufacturers of semiconductor buffers\n\tfor print spooling use the same pun in their slogan\n\t-- \"wait reduction\". (pages 79 and 103)\n    -\tA reader \"asks Steve [Ciarcia]\" for a source of a 512K\n\tS-100 board for his Z-100 computer. Steve replies,\n\t\"the largest dynamic RAM boards that I have seen\n\ton the commercial market for the S-100\n\tbus are 256K.\" The ad ON THE FACING PAGE (413) is for\n\tS-100 boards of 384K to 896K, specifically for the Z-100.\nMy kids get their laughs from MAD comics; I read the ads in BYTE.\n\n\t\t\tDave Tutelman\n\nPS - to compete with the WAFERVAX discussion on the net, see the\nletter in \"user-to-user\" (page 404) asking about the rumor that\nAT&T will bring out the 3B20D on a single chip; the reader asserts\nthat \"it's a board-level product now.\" (The 3B20D, for those who\ndon't recall, is the duplicated-for-reliability supermini.)"},
{ real:true,
from:"upstill@ucbvax.UUCP (Steve Upstill)",
path:"brezvax!decvax!clyde!burl!ulysses!harpo!decvax!ucbvax!upstill",
pv:"version B 2.10.1 6/24/83; site ucbvax.UUCP",
org:"U.C. Berkeley",
groups:"net.micro,net.rumor",
refs:"<266@nmtvax.UUCP>",
subj:"Re: New Half gegabyte ROM, This is no joke!",
date:"Thu, 26-Apr-84 14:09:50 EST",
id:"<462@ucbvax.UUCP>",
body:
"    Well, yes, but if you think that the big news is \"putting all of\nUNIX on one cheap device\", you're missing the boat.  The REAL significance\nof 1/2GB ROM is for what you might call \"vast-storage\".  Think of it:\nthe database for an entire profession could be stored on a single $500\ndevice, updatable weekly or monthly.  For example, an auto-parts store\nwould no longer need a five-foot rack of parts catalogs, but could get\nall its information, intelligently indexed, instantly (or secondly, \nanyway).  I would expect Apple to be delighted at the prospect of their\nN-million \"knowledge workers\" having such easy access to so much \ninformation.  Face it: we are looking at the start of a whole new\nsub-industry.  I predict billions in two years.\n\nSteve Upstill"},
{ real:true,

{ name:"net.nlang", desc:"Natural languages, cultures, heritages", arts:[
{ real:true,
from:"donn@sdchema.UUCP",
path:"brezvax!decvax!clyde!floyd!harpo!decvax!ittvax!dcdwest!sdcsvax!sdchema!donn",
pv:"version B 2.10.1 6/24/83; site sdchema.UUCP",
org:"Used Softwear Jobbers, Inc. (Clandestine Computer Services)",
groups:"net.nlang,net.puzzle",
subj:"Yreka Bakery",
date:"Wed, 28-Mar-84 02:57:34 EST",
id:"<1102@sdchema.UUCP>",
body:
"Someone said some time back that they had been in Yreka, California,\nand had gotten a kick out of the sign 'Yreka Bakery'.  I remember\nthinking at the time what a remarkable coincidence it was that the\nwords formed a palindrome...\n\nLast night I happened to read what Sam Clemens had to say about Yreka:\n\n\t'... Yreka... acquired its curious name -- when in its first\n\tdays it much needed a name -- through an accident.  There was a\n\tbakeshop with a canvas sign which had not yet been put up but\n\thad been painted and stretched to dry in such a way that the\n\tword BAKERY, all but the B, showed through and was reversed.  A\n\tstranger read it wrong end first, YREKA, and supposed that that\n\twas the name of the camp.  The campers were satisfied with it\n\tand adopted it.'\n\nOf course Sam was never noted for being a sober reporter of the facts,\nbut he WAS in San Francisco in 1864, and the town of Yreka must have\nbeen founded during or after the Gold Rush of 1849, so the story has\nat least some small probability of being veracious...\n\nWill wonders never cease,\n\nDonn Seeley    UCSD Chemistry Dept.       ucbvax!sdcsvax!sdchema!donn"},
{ real:true,
from:"mmt@dciem.UUCP (Martin Taylor)",
path:"brezvax!decvax!utzoo!dciem!mmt",

subj:"word pair - wordpair antonyms",

body:

{ real:true,
from:"flinn@seismo.UUCP (E. A. Flinn)",
path:"brezvax!decvax!clyde!floyd!harpo!seismo!flinn",
pv:"version B 2.10.2 alpha 3/24/83; site seismo.UUCP",
org:"Center for Seismic Studies, Arlington, VA",
groups:"net.physics,net.jokes",
subj:"Heaven is hotter than hell",
date:"Fri, 6-Apr-84 11:02:01 EST",
id:"<842@seismo.UUCP>",
body:
"The temperature of Heaven can be rather accurately computed from\navailable data.  Our authority is Isaiah 30:26, \"Moreover, the light\nof the Moon shall be as the light of the Sun and the light of the Sun\nshall be sevenfold, as the light of seven days.\"  Thus Heaven receives\nfrom the Moon as much radiation as we do from the Sun, and in addition\nseven times seven (49) times as much as the Earth does from the Sun,\nor fifty times in all.  The light we receive from the Moon is one\nten-thousandth of the light we receive from the Sun, so we can ignore\nthat.  With these data we can compute the temperature of Heaven.  The\nradiation falling on Heaven will heat it to the point where the heat\nlost by radiation is just equal to the heat received by radiation,\ni.e., Heaven loses fifty times as much heat as the Earth by radiation.\nUsing the Stefan-Boltzmann law for radiation, \n\n\t(H/E)^4 = 50\n\nwhere E is the absolute temperature of the earth (-300K), gives H as\n798K (525C).\n\nThe exact temperature of Hell cannot be computed, but it must be less\nthan 444.6C, the temperature at which brimstone or sulphur changes\nfrom a liquid to a gas.  Revelations 21:8 says \"But the fearful, and\nunbelieving...shall have their part in the lake which burneth with\nfire and brimstone.\"  A lake of molten brimstone means that its\ntemperature must be at or below the boiling point, or 444.6C (Above\nthis point it would be a vapor, not a lake.)\n\nWe have, then, that Heaven, at 525C is hotter than Hell at 445C.\n\n[From \"Applied Optics\" vol. 11, A14, 1972]"},

{ name:"net.sf-lovers", desc:"Science fiction lovers' newsgroup", arts:[
{ real:true,
from:"karl@dartvax.UUCP (Karl Berry)",
path:"brezvax!decvax!clyde!floyd!harpo!decvax!dartvax!karl",
pv:"version B 2.10.1 6/24/83; site dartvax.UUCP",
org:"Dartmouth College",
subj:"Gusliar Wonders.",
date:"Sat, 24-Mar-84 09:54:56 EST",
id:"<977@dartvax.UUCP>",
body:
"   A number of people have recently mentioned Soviet science fiction,\nwhich has reminded me of an excellent collection of short stories I\nrecently read by Kirill Bulychev. ( I hope I spelled the name right.\n) The book is titled Gusliar Wonders, and has a number of truly\nremarkable stories in it. ( It also has some that aren't so\nremarkable. ) It is put out by Macmillan, and one of the blurbs on\nthe cover informed me \"This is part of a continuing effort by\nMacmillan to expand the horizons of modern science fiction with this\nSoviet series.\" Or words to that effect. Has anyone read any of the\nother books in the Macmillan series? Or indeed any Russian authors at\nall?\n\n{cornell,decvax}!dartvax!karl // karl@dartmouth"},
{ real:true,
from:"moret@unmvax.UUCP",
path:"brezvax!decvax!clyde!burl!ulysses!mhuxl!houxm!hogpc!houti!ariel!vax135!floyd!cmcl2!lanl-a!unm-cvax!unmvax!moret",

subj:"Man in the High Castle et alia",

body:
"I am getting *very* irritated with net.sf-lovers.  After a flurry of articles\nfinding Solaris--which is one of the 10-20 greatest SF novels ever, and surely\na masterpiece on the nature of communication--I had to encounter two articles\nwondering what everybody thought was so great about Dick's\nMan in the High Castle...  (I don't think that one has to remember WWII\nto react to that book; I wasn't born by 1945.  There is a lot to get out\nof Dick's novel, about everyday life, about cultural influence, about\nhuman values, but most of all about the meaning of reality.\nWhy is it SF?  Well, why is LeGuin's magnificent The Dispossessed classified\nas SF?  It's just a label and should not imply anything more than \"fiction\nbased upon a different view of the world\";  doesn't SF mean Speculative\nFiction?)\n>From the content of these articles about Lem and Dick and several other news\narticles (such as the running commentary about FTL travel and high-speed\ncameras), I must conclude that I have subscribed to the wrong newsgroup.\nImagine: I thought that this newsgroup was for people interested in SF\n*literature*, for people who considered SF a form of *art*, NOT a form\nof technical writing."},

body:
"Recently, the mail forwarding load on allegra has gotten out of hand. \nPeople are mailing 180K byte files, 20 person mailing lists and the like\nthrough allegra (and multiple other sites as well) to sites all over the\ncontinent.\n\nGateways such as allegra are provided as a courtesy service for\noccasional, light use ONLY.  Should there be a need for large or regular\nmail traffic between two sites, common courtesy dictates the\nestablishment of direct uucp connections, which are also much faster and\nmore reliable. The telephone company does an excellent job of routing\nconnections between any arbitrary pair of telephone numbers; therefore\nthere is little excuse for not having an almost fully interconnected\nnetwork.\n\nWe don't want to follow the practice of some other sites and disallow\nmail forwarding; this only seems to result in increased use of netnews\nfor personal messages of the type \"so-and-so ##*@! system won't forward\nmail, so I'm posting my reply here.\"  On the other hand, allegra simply\ncannot continue to carry the amount of traffic it has been seeing\nrecently. Its puny dialers are perpetually busy, and the machine's load\naverage is often 7 or 8 even at 3 in the morning.\n\nTherefore, we are strongly urging all mail users, particularly those who\nmoderate mailing lists, to establish direct links to their destination\nsites. Use allegra if you wish to exchange uucp coordination messages\nwith other sites, but please don't abuse it.\n\nThank you.\n\nJohn Linderman (allegra!jpl)\nPhil Karn\t(allegra!karn)"},

"An old logjam of news has once again burst free, and we are being\ndeluged with news from last month that we've all seen before.\nErik Fair was the first to report the problem, and has located\nthe log jam.  However, the news has already gotten loose and there\nis nothing we can do to keep it from circulating.\n\nI am posting this so we won't see another deluge of articles in\nvarious newsgroups saying \"Gee, I think some old news is coming\naround.  Does anyone know why?\"  Such queries accomplish nothing,\nand just provide even more uninteresting news to wade through.\n\nReadnews and vnews give the date on each article they offer you.\nIf you see an article dated in Feb, you can just type n.  You'll\nsee plenty of such articles over the next few days, I'm sorry to say.\n\nIf someone wants to make the necessary modifications to expire to\nprevent this problem (by keeping history for a longer time, even\nwhen the articles themselves are expired) it will make a valuable\naddition to the news software.  If you want to discuss this, please\nconfine the discussion to net.news.\n\n\tMark Horton"},

"Scott Orshan of Bell Communications Research has asked me to remind\nthe network that AT&T and the world at large should no longer be using\nthe bell.all newsgroups.  These newsgroups now belong exclusively to\nthe 7 divested Regional Bell Operating Companies and to BCR.  He has\nseen a lot of traffic with newsgroup lists like\n\tnet.wanted,btl.wanted,bell.wanted\nand this is blatantly in violation of the divestiture.\n\nIn fact, I would like to remind people that it is almost NEVER\nappropriate to list more than one \"*.wanted\" newsgroup.  Either post\nto net.wanted, or to att.wanted, or to bell.wanted, or if you have\nsomething like a car or house for sale, restrict it locally with a\nnewsgroup like nj.wanted.  Almost all such abuse seems to originate\nfrom within AT&T, for some reason.  AT&T employees should be especially\ncareful about misusing these newsgroups, since you don't want trouble\nfrom Judge Green.\n\nA reminder to all Usenet contacts - if your sys file still\nmentions bell.all and you are not part of an RBOC or BCR, please\nfix it now.\n\n\tMark Horton"}

/* ------------------------------------------------------------------ */
/*  machinery                                                          */
/* ------------------------------------------------------------------ */

const screen  = document.getElementById("screen");
const status  = document.getElementById("status");
const keysBar = document.getElementById("softkeys");

const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const rot13 = s => s.replace(/[a-zA-Z]/g, c =>
  String.fromCharCode((c<="Z"?90:122) >= c.charCodeAt(0)+13 ? c.charCodeAt(0)+13 : c.charCodeAt(0)-13));

let mode = "boot";          // boot | groups | list | article | help | setup | shell | dial
let gi = 0, ai = 0;
let rotOn = false;
let drawTimer = null;
let paintMs = 11;           // 9600-baud repaint

function setStatus(t){ status.textContent = t; }

function setKeys(defs){
  keysBar.innerHTML = "";
  defs.forEach(([label,fn])=>{
    const b = document.createElement("button");
    b.className = "key";
    b.innerHTML = label;
    b.addEventListener("click", fn);
    keysBar.appendChild(b);
  });
}

/* draw a screen as lines, painted top-to-bottom like a baud-limited repaint */
function paint(lines, after){
  if(drawTimer) clearInterval(drawTimer);
  screen.innerHTML = "";
  let i = 0;
  const step = ()=>{
    if(i >= lines.length){
      if(drawTimer) clearInterval(drawTimer); drawTimer = null;
      if(after) after();
      return;
    }
    const div = document.createElement("div");
    if(typeof lines[i] === "string"){ div.innerHTML = lines[i] === "" ? "&nbsp;" : lines[i]; }
    else { lines[i](div); }
    screen.appendChild(div);
    i++;
  };
  if(paintMs === 0){ while(i < lines.length) step(); step(); return; }
  drawTimer = setInterval(step, paintMs);
}

function rowSpan(text, cls, onTap){
  return el=>{
    const s = document.createElement("span");
    s.className = "row" + (cls?(" "+cls):"");
    s.tabIndex = 0;
    s.innerHTML = text;
    s.addEventListener("click", onTap);
    s.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); onTap(); }});
    el.appendChild(s);
  };
}

/* ------------------------- screens ------------------------------- */

function showGroups(){
  mode = "groups";
  const lines = [];
  lines.push('<span class="inv"> netnews '+esc(BNEWS)+' </span>  site: '+SITE);
  lines.push("");
  lines.push('<span class="hdr">  #  newsgroup            arts  description</span>');
  lines.push('<span class="hdr">  -  ---------            ----  -----------</span>');
  GROUPS.forEach((g,idx)=>{
    const n  = String(idx+1).padStart(3," ");
    const nm = g.name.padEnd(20," ");
    const ct = String(g.arts.length).padStart(4," ");
    lines.push(rowSpan(esc(n+"  "+nm+" "+ct+"  "+g.desc), "trunc", ()=>{ gi=idx; showList(); }));
  });
  lines.push("");
  lines.push('<span class="dim">Tue May  1 09:12:44 EST 1984 -- you have new news.</span>');
  lines.push('<span class="dim">tap a group, or press its number.</span>');
  paint(lines);
  setStatus("newsgroups -- [1-"+GROUPS.length+"] read  [?] help  [q] quit");
  setKeys([
    ["<b>?</b> help", showHelp],
    ["set-up", showSetup],
    ["<b>q</b> quit", quitToShell]
  ]);
}

function showList(){
  mode = "list";
  const g = GROUPS[gi];
  const lines = [];
  lines.push('<span class="inv"> '+esc(g.name)+' </span>  '+g.arts.length+" article"+(g.arts.length>1?"s":""));
  lines.push("");
  g.arts.forEach((a,idx)=>{
    const n = String(idx+1).padStart(3," ");
    const from = a.from.replace(/\s*\(.*\)/,"");
    lines.push(rowSpan(esc(n+"  "+a.subj), "trunc", ()=>{ ai=idx; showArticle(); }));
    lines.push('<span class="dim trunc">     '+esc(from)+"  --  "+esc(a.date.replace(/^\w+, /,""))+"</span>");
  });
  lines.push("");
  lines.push('<span class="dim">tap an article, or press its number.</span>');
  paint(lines);
  setStatus(g.name+" -- [1-"+g.arts.length+"] read  [g] groups  [?] help");
  setKeys([
    ["<b>g</b> groups", showGroups],
    ["<b>?</b> help", showHelp],
    ["<b>q</b> quit", quitToShell]
  ]);
}

function showArticle(){
  mode = "article";
  const g = GROUPS[gi];
  const a = g.arts[ai];
  const body = rotOn ? rot13(a.body) : a.body;
  const nlines = a.body.split("\n").length;
  const lines = [];
  lines.push('<span class="inv"> article '+(ai+1)+' of '+g.arts.length+' in '+esc(g.name)+' </span>' + (rotOn?'  <span class="inv"> ROT13 </span>':""));
  lines.push("");
  lines.push('<span class="hdr">'+esc("Relay-Version: "+BNEWS+"; site "+SITE+".UUCP")+"</span>");
  if(a.pv) lines.push('<span class="hdr">'+esc("Posting-Version: "+a.pv)+"</span>");
  lines.push('<span class="hdr">'+esc("Path: "+a.path)+"</span>");
  lines.push('<span class="hdr">'+esc("From: "+a.from)+"</span>");
  lines.push('<span class="hdr">'+esc("Newsgroups: "+(a.groups||g.name))+"</span>");
  lines.push('<span class="hdr">'+esc("Subject: "+a.subj)+"</span>");
  lines.push('<span class="hdr">'+esc("Message-ID: "+a.id)+"</span>");
  lines.push('<span class="hdr">'+esc("Date: "+a.date)+"</span>");
  if(a.refs) lines.push('<span class="hdr">'+esc("References: "+a.refs)+"</span>");
  if(a.org) lines.push('<span class="hdr">'+esc("Organization: "+a.org)+"</span>");
  lines.push('<span class="hdr">'+esc("Lines: "+nlines)+"</span>");
  lines.push("");
  body.split("\n").forEach(l=>lines.push(esc(l)));
  lines.push("");
  lines.push('<span class="dim">-- end of article '+(ai+1)+" --</span>");
  paint(lines, ()=>{ screen.scrollTop = 0; });
  setStatus(g.name+" #"+(ai+1)+" -- [n]ext [p]rev [b]ack [x]rot13");
  setKeys([
    ["<b>n</b> next", nextArt],
    ["<b>p</b> prev", prevArt],
    ["<b>x</b> rot13", toggleRot],
    ["<b>b</b> list", showList],
    ["<b>g</b> groups", showGroups]
  ]);
}

function nextArt(){
  const g = GROUPS[gi];
  rotOn = false;
  if(ai < g.arts.length-1){ ai++; showArticle(); }
  else if(gi < GROUPS.length-1){ gi++; ai=0; showList(); }
  else showGroups();
}
function prevArt(){
  rotOn = false;
  if(ai > 0){ ai--; showArticle(); } else showList();
}
function toggleRot(){ rotOn = !rotOn; showArticle(); }

/* ------------------------- set-up screen ------------------------- */

const PHOS = [
  {name:"GREEN P1 ", ink:"#3dff70", bg:"#04120a", glow:"0 0 6px rgba(61,255,112,.55), 0 0 1px rgba(61,255,112,.9)", dim:"#1d8f42"},
  {name:"AMBER P3 ", ink:"#ffb43a", bg:"#120c02", glow:"0 0 6px rgba(255,180,58,.5), 0 0 1px rgba(255,180,58,.9)", dim:"#96691f"},
  {name:"WHITE P4 ", ink:"#e6f2ee", bg:"#0a0d0c", glow:"0 0 5px rgba(230,242,238,.45)", dim:"#7b8a85"}
];
let pi = 0;
let fx = true;
const BAUDS = [{name:"9600", ms:11},{name:"1200", ms:42},{name:"AS FAST AS THE GLASS ALLOWS", ms:0}];
let bi = 0;

function applyPhos(){
  const p = PHOS[pi];
  const r = document.documentElement.style;
  r.setProperty("--phos", p.ink);
  r.setProperty("--bg", p.bg);
  r.setProperty("--glow", p.glow);
  r.setProperty("--phos-dim", p.dim);
}
function applyFx(){
  document.body.classList.toggle("fx-off", !fx);
}

function showSetup(){
  mode = "setup";
  const lines = [
'<span class="inv"> SET-UP A </span>',
"",
"        TO EXIT: PRESS ` OR TAP [ exit set-up ]",
"",
rowSpan("        PHOSPHOR        [ "+PHOS[pi].name.trim()+" ]", null, ()=>{ pi=(pi+1)%PHOS.length; applyPhos(); showSetup(); }),
"",
rowSpan("        GLASS FX        [ "+(fx?"ON":"OFF")+" ]", null, ()=>{ fx=!fx; applyFx(); showSetup(); }),
"",
rowSpan("        REPAINT         [ "+BAUDS[bi].name+" ]", null, ()=>{ bi=(bi+1)%BAUDS.length; paintMs=BAUDS[bi].ms; showSetup(); }),
"",
"",
'<span class="dim">        tap a field to cycle it.  settings take effect at</span>',
'<span class="dim">        once and survive nothing.  it is 1984; persistence</span>',
'<span class="dim">        costs extra.</span>'
  ];
  const hold = paintMs; paintMs = 0;   // set-up repaints instantly, like real ROMs
  paint(lines);
  paintMs = hold;
  setStatus("set-up -- ` exits");
  setKeys([["exit set-up", ()=>{ showGroups(); }]]);
}

/* ------------------------- mail ----------------------------------- */
/* Bell Labs Mail, 4.2BSD flavor.  The spool holds the season's        */
/* net.announce postings, delivered by the news gateway.               */

let mi = 0;

function showMail(){
  mode = "mail";
  const lines = [];
  lines.push(esc("Mail version 2.18 5/19/83.  Type ? for help."));
  lines.push(esc('"/usr/spool/mail/guest": '+MAIL.length+" messages "+MAIL.length+" new"));
  MAIL.forEach((m,idx)=>{
    const n = String(idx+1).padStart(2," ");
    const flag = (idx===mi ? ">" : " ") + "N";
    lines.push(rowSpan(esc(flag+n+" "+m.env.padEnd(15," ").slice(0,15)+" "+m.ctime+" "+m.size.padStart(8," ")+' "'+m.subj+'"'), "trunc", ()=>{ mi=idx; showMailMsg(); }));
  });
  lines.push("");
  lines.push('<span class="dim">tap a message, or press its number.  q returns to the shell.</span>');
  paint(lines);
  setStatus("mail -- [1-"+MAIL.length+"] read  [q] shell");
  setKeys([["<b>q</b> shell", quitToShell]]);
}

function showMailMsg(){
  mode = "mailmsg";
  const m = MAIL[mi];
  const lines = [];
  lines.push('<span class="inv"> message '+(mi+1)+' of '+MAIL.length+' </span>');
  lines.push("");
  lines.push('<span class="hdr">'+esc("From news "+m.ctimeFull)+"</span>");
  lines.push('<span class="hdr">'+esc("From: "+m.from)+"</span>");
  lines.push('<span class="hdr">'+esc("Newsgroups: net.announce")+"</span>");
  lines.push('<span class="hdr">'+esc("Subject: "+m.subj)+"</span>");
  lines.push('<span class="hdr">'+esc("Message-ID: "+m.id)+"</span>");
  lines.push('<span class="hdr">'+esc("Date: "+m.date)+"</span>");
  if(m.org) lines.push('<span class="hdr">'+esc("Organization: "+m.org)+"</span>");
  lines.push("");
  m.body.split("\n").forEach(l=>lines.push(esc(l)));
  lines.push("");
  lines.push('<span class="dim">-- end of message '+(mi+1)+' --</span>');
  paint(lines, ()=>{ screen.scrollTop = 0; });
  setStatus("mail #"+(mi+1)+" -- [n]ext [p]rev [b]ack [q] shell");
  setKeys([
    ["<b>n</b> next", ()=>{ if(mi<MAIL.length-1){mi++; showMailMsg();} else showMail(); }],
    ["<b>p</b> prev", ()=>{ if(mi>0){mi--; showMailMsg();} else showMail(); }],
    ["<b>b</b> list", showMail],
    ["<b>q</b> shell", quitToShell]
  ]);
}

/* ------------------------- shell & the wire down ------------------ */
/* q drops you to a real (almost) shell.  the motd told you the word. */

let shellBuf = "";
let shellLine = null;

function quitToShell(){
  mode = "shell";
  shellBuf = "";
  paint([
    '<span class="dim">readnews: exiting -- .newsrc updated</span>',
    "",
    el=>{ shellLine = document.createElement("span"); el.appendChild(shellLine); renderShell(); }
  ]);
  setStatus("brezvax sh -- you have mail, and the motd mentioned a number");
  setKeys([
    ["$ readnews", ()=>{ if(mode==="shell") showGroups(); }],
    ["$ mail",     ()=>{ if(mode==="shell") showMail(); }],
    ["$ tip arpa", ()=>{ if(mode==="shell") dialArpanet(); }],
    ["$ logout",   ()=>{ if(mode==="shell") shellLogout(); }]
  ]);
}
function renderShell(){
  if(shellLine) shellLine.innerHTML = "$ " + esc(shellBuf) + '<span class="cursor"></span>';
}
function shellExec(){
  const cmd = shellBuf.trim().toLowerCase();
  if(shellLine) shellLine.innerHTML = "$ " + esc(shellBuf);   // freeze the typed line
  shellBuf = "";
  if(cmd === "tip arpa"){ dialArpanet(); return; }
  if(cmd === "readnews" || cmd === "news"){ showGroups(); return; }
  if(cmd === "mail"){ showMail(); return; }
  if(cmd === "logout" || cmd === "exit"){ shellLogout(); return; }
  if(cmd === "tip" || cmd.startsWith("tip ")){
    shellSay("usage: tip system-name   (only one system in /etc/remote)");
  } else if(cmd !== ""){
    shellSay(cmd.split(/\s+/)[0] + ": not found");
  }
  const d = document.createElement("div");
  shellLine = document.createElement("span");
  d.appendChild(shellLine);
  screen.appendChild(d);
  renderShell();
  screen.scrollTop = screen.scrollHeight;
}
function shellSay(t){
  const d = document.createElement("div");
  d.textContent = t;
  screen.appendChild(d);
}
function shellLogout(){
  mode = "dead";
  paint([
    "",
    esc("$ logout"),
    "",
    '<span class="dim">brezvax login:</span> <span class="cursor"></span>',
    ""
  ]);
  setStatus("connection idle -- tap RECONNECT");
  setKeys([["RECONNECT", boot]]);
}

/* the hidden door: dial the ghost TIP and fall through to 1977 */
function dialArpanet(){
  if(mode === "dial") return;
  mode = "dial";
  setKeys([]);
  setStatus("placing call ...");
  const lines = [
    "",
    esc("$ tip arpa"),
    '<span class="dim">[dialing]</span>',
  ];
  paint(lines, ()=>{
    let wait = 900;
    setTimeout(()=>{
      const d = document.createElement("div");
      d.textContent = "connected";
      screen.appendChild(d);
      setStatus("CONNECT 300 -- something very old answered");
      setTimeout(()=>{
        const d2 = document.createElement("div");
        d2.innerHTML = "&nbsp;";
        screen.appendChild(d2);
        const d3 = document.createElement("div");
        d3.className = "dim";
        d3.textContent = "(the herald says 1977. we don't ask.)";
        screen.appendChild(d3);
        setTimeout(()=>{ window.location.href = "arpanet/"; }, 1400);
      }, 900);
    }, wait);
  });
}

/* ------------------------- boot ---------------------------------- */

function boot(){
  mode = "boot";
  setKeys([]);
  setStatus("dialing brezvax ...");
  screen.innerHTML = "";
  const seq = [
    ["",                                                         200],
    ["4.2 BSD UNIX (brezvax)",                                   350],
    ["",                                                         250],
    ["login: ",                                                  120, "guest"],
    ["Password:",                                                160, "......", true],
    ["",                                                         220],
    ["Last login: Mon Apr 30 22:41:07 on tty02",                 120],
    ["4.2 BSD UNIX #12: Fri Mar 30 18:02:11 EST 1984",           140],
    ["",                                                         160],
    ["Would the person leaving 300-baud sessions parked on",     90],
    ["the dialin PLEASE hang up when done.  Also: the old",      90],
    ["arpanet dialout is STILL in /etc/remote (\"tip arpa\").",  90],
    ["It should not answer anymore.  It answers.  Leave it",     90],
    ["alone.                                       -- root",     90],
    ["",                                                         140],
    ["You have mail.",                                           180],
    ["",                                                         160],
    ["$ ",                                                       200, "readnews"],
    ["",                                                         400]
  ];
  let li = 0;
  function nextLine(){
    if(li >= seq.length){ showGroups(); return; }
    const [text, pause, typed, hide] = seq[li++];
    const div = document.createElement("div");
    div.textContent = text === "" ? " " : text;
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
    if(typed){
      let ci = 0;
      const t = setInterval(()=>{
        if(ci >= typed.length){ clearInterval(t); setTimeout(nextLine, pause); return; }
        div.textContent += hide ? "" : typed[ci];
        ci++;
      }, 85);
    } else {
      setTimeout(nextLine, pause);
    }
  }
  nextLine();
}

/* ------------------------- keyboard ------------------------------ */

document.addEventListener("keydown", e=>{
  if(e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if(mode === "dial" || mode === "boot") return;
  if(mode === "shell"){
    if(e.key === "Enter"){ e.preventDefault(); shellExec(); }
    else if(e.key === "Backspace"){ e.preventDefault(); shellBuf = shellBuf.slice(0,-1); renderShell(); }
    else if(e.key.length === 1){ e.preventDefault(); shellBuf += e.key; renderShell(); }
    return;
  }
  if(k === "`"){ if(mode==="setup"){ showGroups(); } else showSetup(); return; }
  if(mode === "setup"){ if(k==="escape") showGroups(); return; }
  if(mode === "help"){ backFromHelp(); return; }
  if(k === "?"){ showHelp(); return; }
  if(mode === "groups"){
    const n = parseInt(k,10);
    if(n >= 1 && n <= GROUPS.length){ gi = n-1; showList(); }
    if(k === "q") quitToShell();
  } else if(mode === "list"){
    const n = parseInt(k,10);
    if(n >= 1 && n <= GROUPS[gi].arts.length){ ai = n-1; showArticle(); }
    if(k === "g") showGroups();
    if(k === "q") quitToShell();
  } else if(mode === "article"){
    if(k === "n") nextArt();
    if(k === "p") prevArt();
    if(k === "b") showList();
    if(k === "g") showGroups();
    if(k === "x") toggleRot();
    if(k === " "){ e.preventDefault(); screen.scrollBy({top: screen.clientHeight*0.85, behavior:"smooth"}); }
  } else if(mode === "mail"){
    const n = parseInt(k,10);
    if(n >= 1 && n <= MAIL.length){ mi = n-1; showMailMsg(); }
    if(k === "q") quitToShell();
  } else if(mode === "mailmsg"){
    if(k === "n"){ if(mi<MAIL.length-1){mi++; showMailMsg();} else showMail(); }
    if(k === "p"){ if(mi>0){mi--; showMailMsg();} else showMail(); }
    if(k === "b" || k === "h") showMail();
    if(k === "q") quitToShell();
    if(k === " "){ e.preventDefault(); screen.scrollBy({top: screen.clientHeight*0.85, behavior:"smooth"}); }
  } else if(mode === "dead" && k === "enter"){
    boot();
  }
});

boot();
})();
